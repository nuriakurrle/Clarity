services:
  ollama:
    image: ollama/ollama:latest
    container_name: clarity_ollama
    ports:
      - "11435:11434"
    environment:
      - OLLAMA_HOST=0.0.0.0:11434
    volumes:
      - ollama_data:/root/.ollama
    command: serve
    networks:
      - clarity-network
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Zieht einmalig die benötigten Modelle in die Ollama-Instanz und beendet
  # sich dann. Die Agenten warten via `service_completed_successfully`, bis das
  # durch ist – so antwortet das Backend ohne manuelles `ollama pull`.
  ollama-init:
    image: ollama/ollama:latest
    container_name: clarity_ollama_init
    depends_on:
      ollama:
        condition: service_healthy
    environment:
      - OLLAMA_HOST=http://ollama:11434
    entrypoint: ["/bin/sh", "-c"]
    command: ["ollama pull llama3.2:1b && ollama pull llama3.2:3b"]
    networks:
      - clarity-network
    restart: "no"

  # Die Agenten laufen als Nicht-root-Benutzer. Ältere Dateien unter ./data
  # wurden aber noch als root erzeugt – dieser Service macht sie einmalig
  # beim Start beschreibbar und beendet sich dann (gleiches Muster wie
  # ollama-init).
  data-init:
    build:
      context: ./backend
    image: clarity-backend
    container_name: clarity_data_init
    user: root
    command: chmod -R a+rwX /data
    volumes:
      - ./data:/data
    networks:
      - clarity-network
    restart: "no"

  # Alle Agenten nutzen dasselbe Image (backend/Dockerfile); es wird nur
  # einmal gebaut. Welcher Agent läuft, bestimmt `command:`.
  agent_sentiment:
    build:
      context: ./backend
    image: clarity-backend
    command: python agent_sentiment/main.py
    container_name: clarity_sentiment
    ports:
      - "8001:8000"
    depends_on:
      ollama:
        condition: service_healthy
      ollama-init:
        condition: service_completed_successfully
      data-init:
        condition: service_completed_successfully
    environment:
      - OLLAMA_HOST=http://ollama:11434
      - MODEL=llama3.2:3b
      - PYTHONUNBUFFERED=1
    volumes:
      - ./data:/data
    networks:
      - clarity-network
    restart: unless-stopped

  agent_pattern:
    build:
      context: ./backend
    image: clarity-backend
    command: python agent_pattern/main.py
    container_name: clarity_pattern
    ports:
      - "8002:8000"
    depends_on:
      ollama:
        condition: service_healthy
      ollama-init:
        condition: service_completed_successfully
      data-init:
        condition: service_completed_successfully
    environment:
      - OLLAMA_HOST=http://ollama:11434
      - MODEL=llama3.2:3b
      - PYTHONUNBUFFERED=1
    volumes:
      - ./data:/data
    networks:
      - clarity-network
    restart: unless-stopped

  agent_prompt:
    build:
      context: ./backend
    image: clarity-backend
    command: python agent_prompt/main.py
    container_name: clarity_prompt
    ports:
      - "8003:8000"
    depends_on:
      ollama:
        condition: service_healthy
      ollama-init:
        condition: service_completed_successfully
      data-init:
        condition: service_completed_successfully
    environment:
      - OLLAMA_HOST=http://ollama:11434
      - MODEL=llama3.2:3b
      - PYTHONUNBUFFERED=1
    volumes:
      - ./data:/data
    networks:
      - clarity-network
    restart: unless-stopped

  agent_digest:
    build:
      context: ./backend
    image: clarity-backend
    command: python agent_digest/main.py
    container_name: clarity_digest
    ports:
      - "8004:8000"
    depends_on:
      ollama:
        condition: service_healthy
      ollama-init:
        condition: service_completed_successfully
      data-init:
        condition: service_completed_successfully
    environment:
      - OLLAMA_HOST=http://ollama:11434
      - MODEL=llama3.2:3b
      - SENTIMENT_AGENT_URL=http://agent_sentiment:8000
      - PROMPT_AGENT_URL=http://agent_prompt:8000
      - PATTERN_AGENT_URL=http://agent_pattern:8000
      - PYTHONUNBUFFERED=1
    volumes:
      - ./data:/data
    networks:
      - clarity-network
    restart: unless-stopped

  # Speech-to-Text mit Whisper (lokal, ohne Ollama/LLM). Das Modell wird
  # beim ersten Start heruntergeladen und im Volume gecacht.
  agent_transcribe:
    build:
      context: ./backend
    image: clarity-backend
    command: python agent_transcribe/main.py
    container_name: clarity_transcribe
    ports:
      - "8005:8000"
    environment:
      - WHISPER_MODEL=small
      - PYTHONUNBUFFERED=1
    volumes:
      - whisper_models:/whisper-cache
    networks:
      - clarity-network
    restart: unless-stopped

networks:
  clarity-network:
    driver: bridge

volumes:
  ollama_data:
  whisper_models:
